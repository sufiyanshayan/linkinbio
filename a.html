<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Link-In-Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* মেইন ডিজাইন */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Noto Serif Bengali", serif; background: #f4f6f9; padding: 20px; color: #333; }
.container { width: 100%; max-width: 500px; margin: auto; }
.card { background: #fff; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
.input-group { margin-bottom: 1.2rem; text-align: left; }
label { font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: #555; text-transform: uppercase; }
input, textarea, select { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; font-family: inherit; transition: 0.3s; }
input:focus, select:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

/* পাসওয়ার্ড এবং আই বাটন ফিক্স */
.password-wrapper { position: relative; display: flex; align-items: center; }
.eye-btn { position: absolute; right: 15px; cursor: pointer; color: #888; font-size: 1.1rem; z-index: 10; padding: 5px; }

/* স্মার্ট ইনপুট */
.smart-input { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
.prefix { padding-left: 12px; font-size: 0.8rem; color: #777; font-family: monospace; white-space: nowrap; pointer-events: none; }
.smart-input input { border: none; flex: 1; }

.phone-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.code-box { display: flex; align-items: center; background: #f8f8f8; border-radius: 12px; width: 85px; border: 1px solid #ddd; }
.code-box span { padding-left: 10px; font-weight: bold; }
.code-input { border: none; background: transparent; padding: 10px 5px; width: 100%; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #000; color: #fff; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: 0.3s; font-family: inherit; }
.btn-logout { background: #cc0000; margin-top: 15px; }

.hidden { display: none; }
.form-scroll { max-height: 85vh; overflow-y: auto; padding-right: 10px; }
.status { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 0.85rem; text-align: center; display: none; }
.status-error { display: block; background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
.status-success { display: block; background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
</style>
</head>
<body>

<div class="container">
    <div class="card" id="loginCard">
      <h2 style="text-align:center; margin-bottom:1.5rem;">🔐 Admin Login</h2>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="logEmail" placeholder="admin@example.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="logPass" placeholder="••••••••">
          <i class="fa-regular fa-eye eye-btn" id="eyeIcon"></i>
        </div>
      </div>
      <button class="btn" onclick="handleLogin()" id="logBtn">LOGIN</button>
      <div id="logStatus" class="status"></div>
    </div>

    <div class="card hidden form-scroll" id="formCard">
      <h3 style="margin-bottom:1.5rem; border-bottom:2px solid #eee; padding-bottom:10px;">📝 UPDATE INFORMATION</h3>

      <div class="input-group"><label>1. EMAIL</label><input type="email" id="f1"></div>
      <div class="input-group"><label>2. NAME</label><input type="text" id="f2"></div>
      <div class="input-group"><label>3. TITLE</label><input type="text" id="fTitle" placeholder="e.g., Developer, Creator"></div>
      <div class="input-group"><label>4. PROFILE IMAGE LINK</label><input type="url" id="fProfileImg"></div>

      <div class="input-group"><label>5. FACEBOOK</label><div class="smart-input"><span class="prefix">https://www.facebook.com/</span><input type="text" id="fFb"></div></div>
      <div class="input-group"><label>6. FB PAGE LINK</label><div class="smart-input"><span class="prefix">https://www.facebook.com/</span><input type="text" id="fFbPage"></div></div>
      <div class="input-group"><label>7. INSTAGRAM</label><div class="smart-input"><span class="prefix">https://www.instagram.com/</span><input type="text" id="fIg"></div></div>

      <div class="input-group">
        <label>8. WHATSAPP</label>
        <div class="phone-grid">
          <select id="waSel" onchange="sync('wa')"></select>
          <div class="code-box"><span>+</span><input type="number" id="waCode" class="code-input"></div>
          <input type="tel" id="fWa" style="flex:1.5; border:1px solid #ddd; border-radius:12px; padding-left:12px;">
        </div>
      </div>

      <div class="input-group"><label>9. TIKTOK</label><div class="smart-input"><span class="prefix">https://www.tiktok.com/@</span><input type="text" id="fTiktok"></div></div>
      <div class="input-group"><label>10. TELEGRAM</label><div class="smart-input"><span class="prefix">https://t.me/</span><input type="text" id="fTelegram"></div></div>
      <div class="input-group"><label>11. TWITTER</label><div class="smart-input"><span class="prefix">https://x.com/</span><input type="text" id="fTwitter"></div></div>

      <div class="input-group">
        <label>12. PHONE</label>
        <div class="phone-grid">
          <select id="phSel" onchange="sync('ph')"></select>
          <div class="code-box"><span>+</span><input type="number" id="phCode" class="code-input"></div>
          <input type="tel" id="fPhone" style="flex:1.5; border:1px solid #ddd; border-radius:12px; padding-left:12px;">
        </div>
      </div>

      <div class="input-group"><label>13. ABOUT URL / BIO LINK</label><input type="url" id="fAbout" placeholder="https://..."></div>
      <div class="input-group"><label>14. WEBSITE</label><input type="url" id="fWebsite"></div>
      <div class="input-group"><label>15. FOOTER TEXT</label><input type="text" id="fFooter" placeholder="© 2025 ..."></div>

      <button class="btn" onclick="updateData()" id="upBtn">UPDATE INFORMATION</button>
      <button class="btn btn-logout" onclick="handleLogout()">LOGOUT</button>
      <div id="fStatus" class="status"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_PROJECT_URL = "https://gfahimzxyqwspkeqsvlg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc";
const sb = supabase.createClient(SUPABASE_PROJECT_URL, SUPABASE_ANON_KEY);

const ct = [{c:"880",n:"Bangladesh"},{c:"91",n:"India"},{c:"92",n:"Pakistan"},{c:"1",n:"USA"},{c:"44",n:"UK"},{c:"966",n:"Saudi"}];
function init() {
    let h = '<option value="">Country</option>';
    ct.forEach(i=>{ h+=`<option value="${i.c}">${i.n}</option>`; });
    document.getElementById('waSel').innerHTML=h; document.getElementById('phSel').innerHTML=h;
}
function sync(t) { document.getElementById(t+'Code').value = document.getElementById(t+'Sel').value; }

const eyeIcon = document.getElementById('eyeIcon'), passInp = document.getElementById('logPass');
eyeIcon.addEventListener('click', function() {
    const isPass = passInp.type === 'password';
    passInp.type = isPass ? 'text' : 'password';
    this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
});

async function handleLogin() {
    const e=document.getElementById('logEmail').value, p=document.getElementById('logPass').value, st=document.getElementById('logStatus'), b=document.getElementById('logBtn');
    if(!e || !p) return;
    b.disabled=true; b.innerText="Checking...";
    const { error } = await sb.auth.signInWithPassword({ email:e, password:p });
    if(error) { st.innerText=error.message; st.className="status status-error"; b.disabled=false; b.innerText="LOGIN"; }
    else { 
        document.getElementById('loginCard').classList.add('hidden'); 
        document.getElementById('formCard').classList.remove('hidden');
        loadExistingData(); // লগইন করার পর পুরোনো ডাটা লোড করুন
    }
}

// আগের ডাটা লোড করার ফাংশন
async function loadExistingData() {
    const { data, error } = await sb.from('linkinbi0').select('*').order('id', { ascending: false }).limit(1);
    if(!error && data && data.length > 0) {
        const d = data[0];
        document.getElementById('f1').value = d.email || '';
        document.getElementById('f2').value = d.name || '';
        document.getElementById('fTitle').value = d.title || '';
        document.getElementById('fProfileImg').value = d.profile_image || '';
        document.getElementById('fFb').value = (d.facebook_url || '').replace('https://www.facebook.com/', '');
        document.getElementById('fFbPage').value = (d.facebook_page_url || '').replace('https://www.facebook.com/', '');
        document.getElementById('fIg').value = (d.instagram_url || '').replace('https://www.instagram.com/', '');
        // whatsapp_number থেকে কোড ও নাম্বার আলাদা করা
        let wa = d.whatsapp_number || '';
        if(wa) { 
            let match = wa.match(/\+?(\d+)(\d+)/);
            if(match) { document.getElementById('waCode').value = match[1]; document.getElementById('fWa').value = match[2]; }
        }
        document.getElementById('fTiktok').value = (d.tiktok_url || '').replace('https://www.tiktok.com/@', '');
        document.getElementById('fTelegram').value = (d.telegram_url || '').replace('https://t.me/', '');
        document.getElementById('fTwitter').value = (d.twitter_url || '').replace('https://x.com/', '');
        let ph = d.phone_number || '';
        if(ph) {
            let match = ph.match(/\+?(\d+)(\d+)/);
            if(match) { document.getElementById('phCode').value = match[1]; document.getElementById('fPhone').value = match[2]; }
        }
        document.getElementById('fAbout').value = d.about_url || '';
        document.getElementById('fWebsite').value = d.website_url || '';
        document.getElementById('fFooter').value = d.footer_text || '';
    }
}

async function updateData() {
    const btn=document.getElementById('upBtn'), st=document.getElementById('fStatus');
    
    // SQL টেবিলের কলাম অনুযায়ী ডাটা তৈরি করুন
    const data = {
        email: document.getElementById('f1').value,
        name: document.getElementById('f2').value,
        title: document.getElementById('fTitle').value,
        profile_image: document.getElementById('fProfileImg').value,
        facebook_url: 'https://www.facebook.com/' + document.getElementById('fFb').value,
        facebook_page_url: 'https://www.facebook.com/' + document.getElementById('fFbPage').value,
        instagram_url: 'https://www.instagram.com/' + document.getElementById('fIg').value,
        whatsapp_number: '+' + document.getElementById('waCode').value + document.getElementById('fWa').value.replace(/\D/g,''),
        tiktok_url: 'https://www.tiktok.com/@' + document.getElementById('fTiktok').value,
        telegram_url: 'https://t.me/' + document.getElementById('fTelegram').value,
        twitter_url: 'https://x.com/' + document.getElementById('fTwitter').value,
        phone_number: '+' + document.getElementById('phCode').value + document.getElementById('fPhone').value.replace(/\D/g,''),
        about_url: document.getElementById('fAbout').value,
        website_url: document.getElementById('fWebsite').value,
        footer_text: document.getElementById('fFooter').value,
        updated_at: new Date()
    };
    
    btn.disabled=true; btn.innerText="Updating...";
    
    // আগের ডাটা আপডেট করবেন নাকি নতুন ইনসার্ট করবেন?
    const { data: existing } = await sb.from('linkinbi0').select('id').limit(1);
    
    let error;
    if(existing && existing.length > 0) {
        // আপডেট করুন
        const { error: updateError } = await sb.from('linkinbi0').update(data).eq('id', existing[0].id);
        error = updateError;
    } else {
        // নতুন ইনসার্ট করুন
        const { error: insertError } = await sb.from('linkinbi0').insert([data]);
        error = insertError;
    }
    
    if(error) { st.innerText=error.message; st.className="status status-error"; }
    else { st.innerText="Success: Data Updated!"; st.className="status status-success"; }
    btn.disabled=false; btn.innerText="UPDATE INFORMATION";
}

function handleLogout() { sb.auth.signOut(); location.reload(); }
init();
</script>
</body>
</html>
