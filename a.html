<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Ready Form</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; font-family: "Noto Serif Bengali", serif; background: #f0f2f5; color: #1c1e21; }
.wrapper { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 450px; }
.card { background: #fff; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
h2, h3 { margin-bottom: 1.5rem; font-weight: 700; }
.input-group { margin-bottom: 1.2rem; text-align: left; }
label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
input, textarea { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 1rem; transition: 0.3s; }
input:focus { border-color: #000; }
.password-wrapper { position: relative; display: flex; align-items: center; }
.toggle-password { position: absolute; right: 15px; cursor: pointer; color: #888; font-size: 1.1rem; z-index: 5; padding: 5px; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #000; color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.3s; }
.btn:disabled { background: #666; cursor: not-allowed; }
.hidden { display: none; }
.status { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 0.9rem; display: none; }
.status-error { display: block; background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
.status-success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
.smart-input { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
.domain { padding-left: 12px; font-size: 0.9rem; color: #777; }
.smart-input input { border: none; }
.footer { margin-top: 20px; font-size: 11px; color: #999; text-align: center; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="container">
    
    <!-- Login Section -->
    <div class="card" id="loginCard">
      <h2>🔐 Admin Login</h2>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="example@mail.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPass" placeholder="••••••••">
          <i class="fa-regular fa-eye toggle-password" id="eyeIcon"></i>
        </div>
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Login</button>
      <div id="loginStatus" class="status"></div>
    </div>

    <!-- Data Entry Section -->
    <div class="card hidden" id="formCard">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h3>📝 New Request</h3>
        <button onclick="handleLogout()" style="color:red; background:none; border:none; cursor:pointer;"><i class="fa-solid fa-power-off"></i> Logout</button>
      </div>
      
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter user name">
      </div>

      <div class="input-group">
        <label>Facebook Profile</label>
        <div class="smart-input">
          <span class="domain">fb.com/</span>
          <input type="text" id="fbUser" placeholder="username">
        </div>
      </div>

      <div class="input-group">
        <label>Bio / Details</label>
        <textarea id="bio" rows="3" placeholder="Additional info..."></textarea>
      </div>

      <button class="btn" id="submitBtn" onclick="handleSubmit()">Save to Database</button>
      <div id="formStatus" class="status"></div>
    </div>

    <div class="footer">© 2026 Secured via Supabase</div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// --- SUPABASE CONFIG ---
const URL = 'https://emrbjxmbzmldzjkztwwr.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtcmJqeG1iem1sZHpqa3p0d3dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTIyOTEsImV4cCI6MjA5NTk2ODI5MX0.LybcpC-nZTCinsNJVJCYKRpPcXhqVFKYaxPWyn1AFEg';
const supabase = supabase.createClient(URL, KEY);

// --- PASSWORD TOGGLE (চোখের বাটন) ---
const eyeIcon = document.getElementById('eyeIcon');
const passInput = document.getElementById('loginPass');

eyeIcon.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    eyeIcon.classList.toggle('fa-eye');
    eyeIcon.classList.toggle('fa-eye-slash');
});

// --- LOGIN FUNCTION ---
async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPass').value;
    const status = document.getElementById('loginStatus');
    const btn = document.getElementById('loginBtn');

    if(!email || !password) {
        status.innerText = "সবগুলো ঘর পূরণ করুন!";
        status.className = "status status-error";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Checking...";

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        status.innerText = "Error: " + error.message;
        status.className = "status status-error";
        btn.disabled = false;
        btn.innerText = "Login";
    } else {
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('formCard').classList.remove('hidden');
    }
}

// --- SUBMIT DATA FUNCTION ---
async function handleSubmit() {
    const name = document.getElementById('fullName').value;
    const fb = document.getElementById('fbUser').value;
    const bio = document.getElementById('bio').value;
    const status = document.getElementById('formStatus');
    const btn = document.getElementById('submitBtn');

    if(!name) {
        alert("নাম লিখুন!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Saving...";

    const { error } = await supabase
        .from('hologram_requests') // আপনার টেবিল এর নাম
        .insert([{ name, facebook_url: 'https://fb.com/'+fb, bio }]);

    if (error) {
        status.innerText = "Database Error: " + error.message;
        status.className = "status status-error";
    } else {
        status.innerText = "সফলভাবে সেভ হয়েছে!";
        status.className = "status status-success";
        // ফরম রিসেট
        document.getElementById('fullName').value = '';
        document.getElementById('fbUser').value = '';
        document.getElementById('bio').value = '';
    }
    btn.disabled = false;
    btn.innerText = "Save to Database";
}

// --- LOGOUT ---
async function handleLogout() {
    await supabase.auth.signOut();
    location.reload();
}
</script>

</body>
</html>
