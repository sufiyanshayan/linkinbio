<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>সাইন আপ | ইউজার ম্যানেজমেন্ট</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Space Grotesk',sans-serif;background:linear-gradient(145deg,#0a0a0f,#1a1a2e);color:#fff;overflow-x:hidden;min-height:100vh;}
        .app{max-width:480px;margin:0 auto;background:#0f0f17;min-height:100vh;position:relative;border-left:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05);box-shadow:0 0 50px rgba(0,0,0,0.5);}
        .cyber-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(255,50,100,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(80,200,255,0.15) 0%,transparent 50%),radial-gradient(circle at 40% 20%,rgba(200,100,255,0.15) 0%,transparent 50%),linear-gradient(145deg,#0a0a0f,#1a1a2e);z-index:-2;animation:breathe 10s ease-in-out infinite;}
        @keyframes breathe{0%,100%{opacity:0.8;}50%{opacity:1;}}
        
        header{display:flex;justify-content:center;align-items:center;padding:1rem 1.5rem;background:#14141e;border-bottom:1px solid rgba(255,100,200,0.2);position:sticky;top:0;z-index:100;}
        .logo{font-weight:700;font-size:1.3rem;background:linear-gradient(135deg,#fff,#a0a0ff,#ffa0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px;}
        .logo i{font-size:1.1rem;color:#ffa0ff;filter:drop-shadow(0 0 8px #ffa0ff);}
        
        .container{padding:1.5rem;}
        .neon-card{background:rgba(30,30,44,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,100,255,0.25);border-radius:40px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
        .neon-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,100,255,0.06),rgba(100,200,255,0.06),rgba(255,100,200,0.06),transparent 70%);animation:rotate 15s linear infinite;pointer-events:none;}
        @keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        .form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(255,100,255,0.2);position:relative;z-index:2;}
        .form-header h3{font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,#fff,#ffa0ff,#a0ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .input-group{margin-bottom:1rem;position:relative;z-index:2;}
        label{font-size:0.7rem;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:5px;color:rgba(255,255,255,0.75);text-transform:uppercase;}
        label i{font-size:0.8rem;color:#ffa0ff;width:18px;}
        input{width:100%;padding:12px 14px;background:rgba(20,20,30,0.8);border:2px solid rgba(255,100,255,0.2);border-radius:24px;color:#fff;font-family:'Space Grotesk',monospace;font-size:0.85rem;transition:all 0.3s ease;}
        input:focus{outline:none;border-color:#ffa0ff;box-shadow:0 0 0 2px rgba(255,160,255,0.2);}
        input.error-border{border-color:#ff6688;background:rgba(255,68,68,0.1);}
        input.success-border{border-color:#00ffaa;background:rgba(0,255,170,0.05);}
        .field-status{font-size:0.65rem;margin-top:5px;margin-left:12px;display:flex;align-items:center;gap:5px;}
        .field-status.success{color:#00ffaa;}
        .field-status.error{color:#ff6688;}
        .password-wrapper{position:relative;}
        .password-wrapper input{padding-right:45px;}
        .toggle-password{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,160,255,0.7);font-size:1rem;z-index:10;}
        .toggle-password:hover{color:#ffa0ff;}
        .submit-btn{width:100%;padding:12px;background:linear-gradient(90deg,#ff50a0,#a050ff);border:none;border-radius:40px;color:white;font-weight:600;font-size:0.85rem;cursor:pointer;margin-top:8px;text-transform:uppercase;transition:all 0.3s ease;}
        .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .status{text-align:center;margin-top:12px;padding:8px 12px;border-radius:24px;font-size:0.75rem;}
        .status-success{background:rgba(0,255,150,0.12);color:#00ffaa;border:1px solid rgba(0,255,150,0.25);}
        .status-error{background:rgba(255,68,68,0.12);color:#ff6688;border:1px solid rgba(255,68,68,0.25);}
        .user-list-card{background:rgba(30,30,44,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,100,255,0.25);border-radius:40px;padding:1.5rem;margin-top:1rem;}
        .user-list-title{font-size:0.9rem;margin-bottom:1rem;color:#ffa0ff;display:flex;align-items:center;gap:8px;}
        .user-item{background:rgba(20,20,30,0.6);border-radius:30px;padding:10px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,100,255,0.2);}
        .user-email{font-size:0.8rem;word-break:break-all;flex:1;}
        .user-id{font-size:0.65rem;color:#ffa0ff;margin-left:10px;}
        .delete-btn{background:rgba(255,68,68,0.2);border:none;color:#ff6688;padding:6px 12px;border-radius:30px;cursor:pointer;font-size:0.7rem;transition:all 0.2s;}
        .delete-btn:hover{background:#ff6688;color:white;}
        .no-users{text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:0.8rem;}
        .strength-bar{height:4px;margin-top:8px;border-radius:4px;transition:0.3s;background:#2a2a3a;}
        .strength-weak{background:#ff6688;width:33%;}
        .strength-medium{background:#ffa500;width:66%;}
        .strength-strong{background:#00ffaa;width:100%;}
        
        .loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a12;display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.4s;z-index:400;}
        .loader.active{opacity:1;pointer-events:all;}
        .spinner{width:50px;height:50px;border:3px solid rgba(255,100,255,0.2);border-top:3px solid #ffa0ff;border-right:3px solid #a0ffff;border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        
        .info-badge{background:rgba(0,150,255,0.1);border:1px solid #00aaff;border-radius:20px;padding:5px 12px;font-size:0.7rem;margin-top:10px;text-align:center;}
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="app">
    <header>
        <div class="logo"><i class="fa-regular fa-user-plus"></i> ইউজার ম্যানেজমেন্ট</div>
    </header>
    
    <div class="container">
        <div class="neon-card">
            <div class="form-header"><h3><i class="fa-regular fa-address-card"></i> নিবন্ধন ফর্ম</h3></div>
            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> ইমেইল *</label>
                <input type="email" id="signupEmail" placeholder="your@email.com">
                <div id="emailStatus" class="field-status"></div>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-lock"></i> পাসওয়ার্ড *</label>
                <div class="password-wrapper">
                    <input type="password" id="signupPassword" placeholder="পাসওয়ার্ড দিন">
                    <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('signupPassword',this)"></i>
                </div>
                <div id="passwordStatus" class="field-status"></div>
                <div id="strengthBar" class="strength-bar"></div>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="createUser()"><i class="fa-regular fa-floppy-disk"></i> নিবন্ধন করুন</button>
            <div id="signupStatus" class="status"></div>
            <div class="info-badge">
                <i class="fa-regular fa-circle-info"></i> পাসওয়ার্ডে বড় হাতের, ছোট হাতের, সংখ্যা ও চিহ্ন থাকলে ভালো
            </div>
        </div>

        <div class="user-list-card">
            <div class="user-list-title"><i class="fa-regular fa-users"></i> ইউজার তালিকা (মোট: <span id="userCount">0</span>)</div>
            <div id="userListContainer"><div class="no-users"><i class="fa-regular fa-spinner fa-pulse"></i> লোড হচ্ছে...</div></div>
        </div>
    </div>
    <div class="loader" id="loader"><div class="spinner"></div></div>
</div>

<script>
// Supabase configuration
const SUPABASE_URL = 'https://gfahimzxyqwspkeqsvlg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let users = [];

// UI Functions
function showLoader() { 
    document.getElementById('loader').classList.add('active');
}
function hideLoader() { 
    document.getElementById('loader').classList.remove('active');
}

function showMessage(msg, type) {
    const div = document.getElementById('signupStatus');
    div.innerHTML = `<div class="status-${type}"><i class="fa-regular fa-${type === 'success' ? 'circle-check' : 'circle-xmark'}"></i> ${msg}</div>`;
    setTimeout(() => { 
        if (div.innerHTML.includes(msg)) div.innerHTML = ''; 
    }, 4000);
}

function escapeText(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Password Toggle
window.togglePassword = function(fieldId, icon) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
};

// Validation
function validateEmail() {
    const email = document.getElementById('signupEmail');
    const status = document.getElementById('emailStatus');
    const value = email.value.trim();
    
    if (!value) {
        email.classList.remove('error-border', 'success-border');
        status.innerHTML = '';
        return false;
    }
    if (!value.includes('@') || !value.includes('.')) {
        email.classList.add('error-border');
        email.classList.remove('success-border');
        status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> সঠিক ইমেইল দিন';
        status.className = 'field-status error';
        return false;
    }
    email.classList.add('success-border');
    email.classList.remove('error-border');
    status.innerHTML = '<i class="fa-regular fa-circle-check"></i> সঠিক ইমেইল';
    status.className = 'field-status success';
    return true;
}

function checkPasswordStrength(p) {
    if (!p) return 'none';
    let score = 0;
    if (p.length >= 6) score++;
    if (/[a-z]/.test(p)) score++;
    if (/[A-Z]/.test(p)) score++;
    if (/[0-9]/.test(p)) score++;
    if (/[^a-zA-Z0-9]/.test(p)) score++;
    if (p.length < 6) return 'weak';
    if (score >= 5) return 'strong';
    if (score >= 3) return 'medium';
    return 'weak';
}

function validatePassword() {
    const pwd = document.getElementById('signupPassword');
    const status = document.getElementById('passwordStatus');
    const bar = document.getElementById('strengthBar');
    const value = pwd.value;
    const strength = checkPasswordStrength(value);
    
    if (!value) {
        pwd.classList.remove('error-border', 'success-border');
        status.innerHTML = '';
        bar.className = 'strength-bar';
        return false;
    }
    if (value.length < 6) {
        pwd.classList.add('error-border');
        pwd.classList.remove('success-border');
        status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> কমপক্ষে ৬ অক্ষর';
        status.className = 'field-status error';
        bar.className = 'strength-bar strength-weak';
        return false;
    }
    if (strength === 'weak') {
        pwd.classList.add('error-border');
        pwd.classList.remove('success-border');
        status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> দুর্বল - বড় হাতের, সংখ্যা বা চিহ্ন যোগ করুন';
        status.className = 'field-status error';
        bar.className = 'strength-bar strength-weak';
        return false;
    }
    if (strength === 'medium') {
        pwd.classList.add('success-border');
        pwd.classList.remove('error-border');
        status.innerHTML = '<i class="fa-regular fa-circle-check"></i> মাঝারি (গ্রহণযোগ্য)';
        status.className = 'field-status success';
        bar.className = 'strength-bar strength-medium';
        return true;
    }
    if (strength === 'strong') {
        pwd.classList.add('success-border');
        pwd.classList.remove('error-border');
        status.innerHTML = '<i class="fa-regular fa-circle-check"></i> শক্তিশালী';
        status.className = 'field-status success';
        bar.className = 'strength-bar strength-strong';
        return true;
    }
    return false;
}

function checkForm() {
    const valid = validateEmail() && validatePassword();
    document.getElementById('submitBtn').disabled = !valid;
    return valid;
}

// Load users from database
async function loadUsers() {
    showLoader();
    try {
        const { data, error } = await supabase.from('user').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        users = data || [];
        displayUsers();
    } catch (err) {
        console.error(err);
        document.getElementById('userListContainer').innerHTML = `<div class="no-users">ত্রুটি: ${err.message}</div>`;
    }
    hideLoader();
}

// Display users
function displayUsers() {
    const container = document.getElementById('userListContainer');
    const counter = document.getElementById('userCount');
    counter.innerText = users.length;
    
    if (users.length === 0) {
        container.innerHTML = '<div class="no-users">📭 কোনো ইউজার নেই। উপরে নতুন নিবন্ধন করুন।</div>';
        return;
    }
    
    let html = '';
    users.forEach((user, idx) => {
        html += `
            <div class="user-item">
                <div class="user-email">
                    <i class="fa-regular fa-envelope" style="margin-right:8px;color:#ffa0ff;"></i>
                    ${escapeText(user.email)}
                    <span class="user-id">#${idx+1}</span>
                </div>
                <button class="delete-btn" onclick="deleteUser('${user.id}', '${escapeText(user.email)}', ${idx})">
                    <i class="fa-regular fa-trash-can"></i> মুছুন
                </button>
            </div>
        `;
    });
    container.innerHTML = html;
}

// Create user
async function createUserInDB(email, password) {
    showLoader();
    try {
        // First create in Auth
        const { data: authData, error: authError } = await supabase.auth.signUp({
            email: email,
            password: password
        });
        
        if (authError) throw authError;
        
        // Then save to user table
        const { error: dbError } = await supabase.from('user').insert([{ 
            email: email, 
            password: password,
            auth_id: authData.user?.id || null
        }]);
        
        if (dbError) throw dbError;
        
        showMessage('✅ নিবন্ধন সফল হয়েছে!', 'success');
        await loadUsers();
        
        // Clear form
        document.getElementById('signupEmail').value = '';
        document.getElementById('signupPassword').value = '';
        document.getElementById('strengthBar').className = 'strength-bar';
        document.getElementById('submitBtn').disabled = true;
        document.querySelectorAll('.field-status').forEach(d => d.innerHTML = '');
        document.querySelectorAll('input').forEach(i => i.classList.remove('success-border', 'error-border'));
        
    } catch (err) {
        console.error(err);
        if (err.message.includes('already registered')) {
            showMessage('❌ এই ইমেইল already নিবন্ধিত আছে!', 'error');
        } else {
            showMessage('❌ নিবন্ধন失败: ' + err.message, 'error');
        }
    }
    hideLoader();
}

// Delete user
window.deleteUser = async function(id, email, index) {
    if (!confirm(`"${email}" কি ডিলিট করবেন?`)) return;
    showLoader();
    try {
        const { error } = await supabase.from('user').delete().eq('id', id);
        if (error) throw error;
        users.splice(index, 1);
        displayUsers();
        showMessage(`✅ "${email}" ডিলিট হয়েছে`, 'success');
    } catch (err) {
        showMessage('❌ ডিলিট ব্যর্থ: ' + err.message, 'error');
    }
    hideLoader();
};

// Create user handler
window.createUser = function() {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const strength = checkPasswordStrength(password);
    
    if (!email || !validateEmail()) {
        showMessage('❌ সঠিক ইমেইল দিন', 'error');
        return;
    }
    if (!password || password.length < 6) {
        showMessage('❌ পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে', 'error');
        return;
    }
    if (strength === 'weak') {
        showMessage('❌ পাসওয়ার্ড খুব দুর্বল! বড় হাতের, সংখ্যা বা চিহ্ন দিন', 'error');
        return;
    }
    createUserInDB(email, password);
};

// Event listeners
document.getElementById('signupEmail').addEventListener('input', () => { validateEmail(); checkForm(); });
document.getElementById('signupPassword').addEventListener('input', () => { validatePassword(); checkForm(); });

// Initial load
loadUsers();
</script>
</body>
</html>
