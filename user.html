<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | Hologram Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Space Grotesk',sans-serif;background:linear-gradient(145deg,#0a0a0f,#1a1a2e);color:#fff;overflow-x:hidden;min-height:100vh;}
        .app{max-width:480px;margin:0 auto;background:#0f0f17;min-height:100vh;position:relative;border-left:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05);box-shadow:0 0 50px rgba(0,0,0,0.5);}
        .cyber-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(255,50,100,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(80,200,255,0.15) 0%,transparent 50%),radial-gradient(circle at 40% 20%,rgba(200,100,255,0.15) 0%,transparent 50%),linear-gradient(145deg,#0a0a0f,#1a1a2e);z-index:-2;animation:breathe 10s ease-in-out infinite;}
        @keyframes breathe{0%,100%{opacity:0.8;}50%{opacity:1;}}
        
        header{display:flex;justify-content:center;align-items:center;padding:1rem 1.5rem;background:#14141e;border-bottom:1px solid rgba(255,100,200,0.2);position:sticky;top:0;z-index:100;}
        .logo{font-weight:700;font-size:1.3rem;background:linear-gradient(135deg,#fff,#a0a0ff,#ffa0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px;}
        .logo i{font-size:1.1rem;color:#ffa0ff;filter:drop-shadow(0 0 8px #ffa0ff);}
        
        .container{padding:1.5rem;}
        .neon-card{background:rgba(30,30,44,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,100,255,0.25);border-radius:40px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
        .neon-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,100,255,0.06),rgba(100,200,255,0.06),rgba(255,100,200,0.06),transparent 70%);animation:rotate 15s linear infinite;pointer-events:none;}
        @keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        .form-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(255,100,255,0.2);position:relative;z-index:2;}
        .form-header h3{font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,#fff,#ffa0ff,#a0ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .input-group{margin-bottom:1rem;position:relative;z-index:2;}
        label{font-size:0.7rem;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:5px;color:rgba(255,255,255,0.75);text-transform:uppercase;}
        label i{font-size:0.8rem;color:#ffa0ff;width:18px;}
        input{width:100%;padding:12px 14px;background:rgba(20,20,30,0.8);border:2px solid rgba(255,100,255,0.2);border-radius:24px;color:#fff;font-family:'Space Grotesk',monospace;font-size:0.85rem;transition:all 0.3s ease;}
        input:focus{outline:none;border-color:#ffa0ff;box-shadow:0 0 0 2px rgba(255,160,255,0.2);}
        input.error-border{border-color:#ff6688;background:rgba(255,68,68,0.1);}
        input.success-border{border-color:#00ffaa;background:rgba(0,255,170,0.05);}
        .field-status{font-size:0.65rem;margin-top:5px;margin-left:12px;display:flex;align-items:center;gap:5px;}
        .field-status.success{color:#00ffaa;}
        .field-status.error{color:#ff6688;}
        .password-wrapper{position:relative;}
        .password-wrapper input{padding-right:45px;}
        .toggle-password{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,160,255,0.7);font-size:1rem;z-index:10;}
        .toggle-password:hover{color:#ffa0ff;}
        .cyber-btn{width:100%;padding:12px;background:linear-gradient(90deg,#ff50a0,#a050ff);border:none;border-radius:40px;color:white;font-weight:600;font-size:0.85rem;cursor:pointer;margin-top:8px;text-transform:uppercase;transition:all 0.3s ease;}
        .cyber-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .status{text-align:center;margin-top:12px;padding:8px 12px;border-radius:24px;font-size:0.75rem;}
        .status-success{background:rgba(0,255,150,0.12);color:#00ffaa;border:1px solid rgba(0,255,150,0.25);}
        .status-error{background:rgba(255,68,68,0.12);color:#ff6688;border:1px solid rgba(255,68,68,0.25);}
        .user-list-card{background:rgba(30,30,44,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,100,255,0.25);border-radius:40px;padding:1.5rem;margin-top:1rem;}
        .user-list-title{font-size:0.9rem;margin-bottom:1rem;color:#ffa0ff;display:flex;align-items:center;gap:8px;}
        .user-item{background:rgba(20,20,30,0.6);border-radius:30px;padding:10px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,100,255,0.2);}
        .user-email{font-size:0.8rem;word-break:break-all;flex:1;}
        .user-id{font-size:0.65rem;color:#ffa0ff;margin-left:10px;}
        .delete-user-btn{background:rgba(255,68,68,0.2);border:none;color:#ff6688;padding:6px 12px;border-radius:30px;cursor:pointer;font-size:0.7rem;transition:all 0.2s;}
        .delete-user-btn:hover{background:#ff6688;color:white;}
        .no-users{text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:0.8rem;}
        .strength-bar{height:4px;margin-top:8px;border-radius:4px;transition:0.3s;background:#2a2a3a;}
        .strength-weak{background:#ff6688;width:33%;}
        .strength-medium{background:#ffa500;width:66%;}
        .strength-strong{background:#00ffaa;width:100%;}
        
        .loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a12;display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.4s;z-index:400;}
        .loader.active{opacity:1;pointer-events:all;}
        .neon-spinner{width:50px;height:50px;border:3px solid rgba(255,100,255,0.2);border-top:3px solid #ffa0ff;border-right:3px solid #a0ffff;border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        
        .auth-badge{background:rgba(0,255,150,0.1);border:1px solid #00ffaa;border-radius:20px;padding:5px 12px;font-size:0.7rem;margin-top:10px;text-align:center;}
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="app">
    <header>
        <div class="logo"><i class="fa-regular fa-crystal"></i> SECURE AUTH SYSTEM</div>
    </header>
    
    <div class="container">
        <div class="neon-card">
            <div class="form-header"><h3><i class="fa-regular fa-fingerprint"></i> CREATE USER (AUTH + DB)</h3></div>
            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> EMAIL *</label>
                <input type="email" id="signupEmail" placeholder="your@email.com">
                <div id="emailStatus" class="field-status"></div>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-lock"></i> PASSWORD *</label>
                <div class="password-wrapper">
                    <input type="password" id="signupPassword" placeholder="********">
                    <i class="fa-regular fa-eye toggle-password" onclick="window.togglePassword('signupPassword',this)"></i>
                </div>
                <div id="passwordStatus" class="field-status"></div>
                <div id="strengthBar" class="strength-bar"></div>
            </div>
            <button class="cyber-btn" id="submitBtn" onclick="window.createUser()"><i class="fa-regular fa-floppy-disk"></i> CREATE & AUTH</button>
            <div id="signupStatus" class="status"></div>
            <div class="auth-badge">
                <i class="fa-regular fa-shield-haltered"></i> Auto-authentication enabled | Secure Delete via Edge Function
            </div>
        </div>

        <div class="user-list-card">
            <div class="user-list-title"><i class="fa-regular fa-users"></i> REGISTERED USERS (TOTAL: <span id="userCount">0</span>)</div>
            <div id="userListContainer"><div class="no-users">No users found. Create one above.</div></div>
        </div>
    </div>
    <div class="loader" id="loader"><div class="neon-spinner"></div></div>
</div>

<script>
(function() {
    // ========== SUPABASE CONFIG ==========
    const SUPABASE_URL = 'https://gfahimzxyqwspkeqsvlg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc';
    
    // Edge Function URL (আপনার Supabase project URL এর সাথে)
    const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/delete-user`;

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let users = [];

    // ========== UI FUNCTIONS ==========
    function showLoader() { 
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('active');
    }
    
    function hideLoader() { 
        const loader = document.getElementById('loader');
        if (loader) loader.classList.remove('active');
    }

    function showStatus(msg, type) {
        const div = document.getElementById('signupStatus');
        if (!div) return;
        div.innerHTML = `<div class="status-${type}"><i class="fa-regular fa-${type === 'success' ? 'circle-check' : 'circle-exclamation'}"></i> ${msg}</div>`;
        setTimeout(() => { 
            if (div.innerHTML.includes(msg)) div.innerHTML = ''; 
        }, 5000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== PASSWORD TOGGLE ==========
    window.togglePassword = function(fieldId, iconElement) {
        const passwordInput = document.getElementById(fieldId);
        if (!passwordInput) return;
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    };

    // ========== VALIDATION ==========
    function validateEmail() {
        const email = document.getElementById('signupEmail');
        const status = document.getElementById('emailStatus');
        if (!email || !status) return false;
        
        const emailValue = email.value.trim();
        
        if (!emailValue) {
            email.classList.remove('error-border', 'success-border');
            status.innerHTML = '';
            return false;
        }
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailRegex.test(emailValue)) {
            email.classList.add('error-border');
            email.classList.remove('success-border');
            status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Invalid email';
            status.className = 'field-status error';
            return false;
        }
        email.classList.add('success-border');
        email.classList.remove('error-border');
        status.innerHTML = '<i class="fa-regular fa-circle-check"></i> Valid email';
        status.className = 'field-status success';
        return true;
    }

    function checkStrength(p) {
        if (!p || p.length === 0) return 'none';
        let s = 0;
        if (p.length >= 6) s++;
        if (/[a-z]/.test(p)) s++;
        if (/[A-Z]/.test(p)) s++;
        if (/[0-9]/.test(p)) s++;
        if (/[^a-zA-Z0-9]/.test(p)) s++;
        if (p.length < 6) return 'weak';
        if (s >= 5) return 'strong';
        if (s >= 3) return 'medium';
        return 'weak';
    }

    function validatePassword() {
        const pwd = document.getElementById('signupPassword');
        const status = document.getElementById('passwordStatus');
        const bar = document.getElementById('strengthBar');
        if (!pwd || !status || !bar) return false;
        
        const pwdValue = pwd.value;
        const strength = checkStrength(pwdValue);
        
        if (!pwdValue) {
            pwd.classList.remove('error-border', 'success-border');
            status.innerHTML = '';
            bar.className = 'strength-bar';
            return false;
        }
        if (pwdValue.length < 6) {
            pwd.classList.add('error-border');
            pwd.classList.remove('success-border');
            status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Min 6 characters';
            status.className = 'field-status error';
            bar.className = 'strength-bar strength-weak';
            return false;
        }
        if (strength === 'weak') {
            pwd.classList.add('error-border');
            pwd.classList.remove('success-border');
            status.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> WEAK - use letters + numbers + symbols';
            status.className = 'field-status error';
            bar.className = 'strength-bar strength-weak';
            return false;
        }
        if (strength === 'medium') {
            pwd.classList.add('success-border');
            pwd.classList.remove('error-border');
            status.innerHTML = '<i class="fa-regular fa-circle-check"></i> MEDIUM (OK)';
            status.className = 'field-status success';
            bar.className = 'strength-bar strength-medium';
            return true;
        }
        if (strength === 'strong') {
            pwd.classList.add('success-border');
            pwd.classList.remove('error-border');
            status.innerHTML = '<i class="fa-regular fa-circle-check"></i> STRONG';
            status.className = 'field-status success';
            bar.className = 'strength-bar strength-strong';
            return true;
        }
        return false;
    }

    function checkAll() {
        const valid = validateEmail() && validatePassword();
        const btn = document.getElementById('submitBtn');
        if (btn) btn.disabled = !valid;
        return valid;
    }

    // ========== LOAD USERS FROM DATABASE ==========
    async function loadUsers() {
        showLoader();
        try {
            const { data, error } = await supabase.from('user').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            users = data || [];
            renderUserList();
            console.log('✅ Loaded', users.length, 'users from DB');
        } catch (err) {
            console.error('❌ Load error:', err);
            const container = document.getElementById('userListContainer');
            if (container) container.innerHTML = `<div class="no-users">Error: ${err.message}</div>`;
        }
        hideLoader();
    }

    // ========== RENDER USER LIST ==========
    function renderUserList() {
        const container = document.getElementById('userListContainer');
        const countSpan = document.getElementById('userCount');
        if (!container || !countSpan) return;
        
        countSpan.innerText = users.length;
        
        if (users.length === 0) {
            container.innerHTML = '<div class="no-users">✨ No users found. Create one above.</div>';
            return;
        }
        
        let html = '';
        users.forEach((user, index) => {
            const shortId = user.auth_id ? user.auth_id.substring(0, 8) : (user.id ? user.id.substring(0, 8) : 'unknown');
            html += `
                <div class="user-item">
                    <div class="user-email">
                        <i class="fa-regular fa-envelope" style="margin-right:8px;color:#ffa0ff;"></i>
                        ${escapeHtml(user.email)}
                        <span class="user-id">(id:${shortId}...)</span>
                    </div>
                    <button class="delete-user-btn" onclick="window.deleteUser('${user.id}', '${escapeHtml(user.email)}', '${user.auth_id || user.id}', ${index})">
                        <i class="fa-regular fa-trash-can"></i> DELETE (Auth+DB)
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ========== CREATE USER WITH AUTHENTICATION ==========
    async function createUserInAuthAndDB(email, password) {
        showLoader();
        try {
            // Step 1: Create user in Supabase Auth
            console.log('📝 Creating user in Auth...');
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        created_via: 'user_management_app'
                    }
                }
            });
            
            if (authError) throw authError;
            
            console.log('✅ Auth user created:', authData.user.id);
            
            // Step 2: Insert into our custom 'user' table
            console.log('💾 Saving to user table...');
            const { error: dbError } = await supabase
                .from('user')
                .insert([{ 
                    email: email, 
                    password: password,
                    auth_id: authData.user.id,
                    created_at: new Date().toISOString()
                }]);
            
            if (dbError) {
                console.error('❌ DB insert error:', dbError);
                showStatus('⚠️ Auth created but DB save failed: ' + dbError.message, 'error');
                hideLoader();
                return;
            }
            
            console.log('✅ DB user saved successfully');
            showStatus('🎉 User created successfully in Auth & Database!', 'success');
            
            // Refresh user list
            await loadUsers();
            
            // Clear form
            const emailInput = document.getElementById('signupEmail');
            const passwordInput = document.getElementById('signupPassword');
            const strengthBar = document.getElementById('strengthBar');
            if (emailInput) emailInput.value = '';
            if (passwordInput) passwordInput.value = '';
            if (strengthBar) strengthBar.className = 'strength-bar';
            
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) submitBtn.disabled = true;
            
            const statusDivs = document.querySelectorAll('.field-status');
            statusDivs.forEach(d => d.innerHTML = '');
            
            const inputs = document.querySelectorAll('input');
            inputs.forEach(i => i.classList.remove('success-border', 'error-border'));
            
        } catch (err) {
            console.error('❌ Create error:', err);
            if (err.message.includes('User already registered') || err.status === 400) {
                showStatus('❌ Email already registered in Authentication system!', 'error');
            } else {
                showStatus('❌ Create failed: ' + err.message, 'error');
            }
        } finally {
            hideLoader();
        }
    }

    // ========== DELETE USER (via Edge Function - Auth + DB) ==========
    window.deleteUser = async function(dbId, email, authId, index) {
        if (!confirm(`⚠️⚠️⚠️ This will PERMANENTLY DELETE "${email}" from BOTH:\n- Authentication System\n- Database Table\n\nThis action CANNOT be undone! Continue?`)) return;
        
        showLoader();
        
        try {
            // Call Edge Function to delete from both Auth and DB
            const response = await fetch(EDGE_FUNCTION_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({ 
                    userId: authId,
                    email: email,
                    dbId: dbId
                })
            });
            
            const result = await response.json();
            
            if (!response.ok || !result.success) {
                throw new Error(result.error || 'Delete failed');
            }
            
            // Remove from local array and re-render
            users.splice(index, 1);
            renderUserList();
            showStatus(`✅ User "${email}" deleted successfully from Auth & Database!`, 'success');
            
        } catch (err) {
            console.error('❌ Delete error:', err);
            showStatus('❌ Delete failed: ' + err.message, 'error');
        } finally {
            hideLoader();
        }
    };

    // ========== CREATE BUTTON HANDLER ==========
    window.createUser = function() {
        const emailInput = document.getElementById('signupEmail');
        const passwordInput = document.getElementById('signupPassword');
        
        if (!emailInput || !passwordInput) return;
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const strength = checkStrength(password);
        
        if (!email || !validateEmail()) {
            showStatus('❌ Valid email required!', 'error');
            return;
        }
        if (!password || password.length < 6) {
            showStatus('❌ Password must be 6+ characters!', 'error');
            return;
        }
        if (strength === 'weak') {
            showStatus('❌ Password too weak! Use uppercase, lowercase, numbers, symbols.', 'error');
            return;
        }
        
        createUserInAuthAndDB(email, password);
    };

    // ========== EVENT LISTENERS ==========
    document.addEventListener('DOMContentLoaded', function() {
        const emailInput = document.getElementById('signupEmail');
        const passwordInput = document.getElementById('signupPassword');
        
        if (emailInput) {
            emailInput.addEventListener('input', () => { 
                validateEmail(); 
                checkAll(); 
            });
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('input', () => { 
                validatePassword(); 
                checkAll(); 
            });
        }
        
        checkAll();
    });

    // ========== INIT ==========
    loadUsers();
    
    // Check current auth session
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            console.log('✅ User is logged in:', session.user.email);
        } else {
            console.log('ℹ️ No active session');
        }
    });
})();
</script>
</body>
</html>
