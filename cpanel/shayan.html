<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Link-In-Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* মেইন ডিজাইন */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Noto Serif Bengali", serif; background: #f4f6f9; padding: 20px; color: #333; }
.container { width: 100%; max-width: 500px; margin: auto; }
.card { background: #fff; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
.input-group { margin-bottom: 1.2rem; text-align: left; }
label { font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: #555; text-transform: uppercase; }
input, textarea, select { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; font-family: inherit; transition: 0.3s; }
input:focus, select:focus, textarea:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
input.error { border-color: #cc0000; background: #fff5f5; }

/* পাসওয়ার্ড এবং আই বাটন ফিক্স */
.password-wrapper { position: relative; display: flex; align-items: center; }
.eye-btn { position: absolute; right: 15px; cursor: pointer; color: #888; font-size: 1.1rem; z-index: 10; padding: 5px; }

/* স্মার্ট ইনপুট */
.smart-input { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
.prefix { padding-left: 12px; font-size: 0.8rem; color: #777; font-family: monospace; white-space: nowrap; pointer-events: none; }
.smart-input input { border: none; flex: 1; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #000; color: #fff; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: 0.3s; font-family: inherit; }
.btn:hover { background: #222; }
.btn:disabled { background: #999; cursor: not-allowed; }
.btn-logout { background: #cc0000; margin-top: 15px; }
.btn-logout:hover { background: #aa0000; }

.hidden { display: none; }
.form-scroll { max-height: 85vh; overflow-y: auto; padding-right: 10px; }
.status { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 0.85rem; text-align: center; display: none; }
.status-error { display: block; background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
.status-success { display: block; background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
.status-warning { display: block; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }

/* লোডিং স্পিনার */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ভ্যালিডেশন এরর টেক্সট */
.validation-error {
    color: #cc0000;
    font-size: 0.7rem;
    margin-top: 4px;
    display: none;
}
.validation-error.show {
    display: block;
}
</style>
</head>
<body>

<div class="container">
    <!-- লগইন কার্ড -->
    <div class="card" id="loginCard">
      <h2 style="text-align:center; margin-bottom:1.5rem;">🔐 Admin Login</h2>
      
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="logEmail" placeholder="admin@example.com" autocomplete="email">
        <div class="validation-error" id="emailError">⚠️ Valid email address required!</div>
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="logPass" placeholder="••••••••" autocomplete="current-password">
          <i class="fa-regular fa-eye eye-btn" id="eyeIcon"></i>
        </div>
        <div class="validation-error" id="passError">⚠️ Password is required!</div>
      </div>
      
      <button class="btn" onclick="handleLogin()" id="logBtn">LOGIN</button>
      <div id="logStatus" class="status"></div>
    </div>

    <!-- ফর্ম কার্ড -->
    <div class="card hidden form-scroll" id="formCard">
      <h3 style="margin-bottom:1.5rem; border-bottom:2px solid #eee; padding-bottom:10px;">📝 UPDATE INFORMATION</h3>

      <div class="input-group"><label>1. WEBSITE TITLE</label><input type="text" id="f1" placeholder="Your_Name"></div>
      <div class="input-group"><label>2. FAVICON LINK</label><input type="url" id="f2" placeholder="Your_Favicon_Link"></div>
      <div class="input-group"><label>3. PROFILE PICTURE LINK</label><input type="url" id="f3" placeholder="Your_Profile_Picture_Link"></div>
      <div class="input-group"><label>4. NAME</label><input type="text" id="f4" placeholder="Your_Name"></div>
      <div class="input-group"><label>5. TITLE</label><input type="text" id="f5" placeholder="Your_Title"></div>

      <div class="input-group"><label>6. FACEBOOK</label><div class="smart-input"><span class="prefix">https://www.facebook.com/</span><input type="text" id="f6"></div></div>
      <div class="input-group"><label>7. FACEBOOK PAGE LINK</label><div class="smart-input"><span class="prefix">https://www.facebook.com/</span><input type="text" id="f7"></div></div>
      <div class="input-group"><label>8. INSTAGRAM</label><div class="smart-input"><span class="prefix">https://www.instagram.com/</span><input type="text" id="f8"></div></div>

      <div class="input-group">
        <label>9. WHATSAPP</label>
        <input type="text" id="f9" placeholder="+8801XXXXXXXXX">
      </div>

      <div class="input-group"><label>10. TIKTOK</label><div class="smart-input"><span class="prefix">https://www.tiktok.com/@</span><input type="text" id="f10"></div></div>
      <div class="input-group"><label>11. TELEGRAM</label><div class="smart-input"><span class="prefix">https://t.me/</span><input type="text" id="f11"></div></div>
      <div class="input-group"><label>12. TWITTER</label><div class="smart-input"><span class="prefix">https://x.com/</span><input type="text" id="f12"></div></div>

      <div class="input-group">
        <label>13. PHONE</label>
        <input type="text" id="f13" placeholder="+8801XXXXXXXXX">
      </div>

      <div class="input-group"><label>14. ABOUT</label><textarea id="f14" rows="3"></textarea></div>
      <div class="input-group"><label>15. WEBSITE</label><input type="url" id="f15"></div>

      <div class="input-group"><label>16. COPYRIGHT LINE</label><input type="text" id="f16" placeholder="Copyright © 2026 MADE BY"></div>
      <div class="input-group"><label>17. MADE BY NAME</label><input type="text" id="f17" placeholder="Your_Name"></div>
      <div class="input-group"><label>18. ALL RIGHTS RESERVED</label><input type="text" id="f18" placeholder="All Rights Reserved."></div>

      <button class="btn" onclick="updateData()" id="upBtn">UPDATE INFORMATION</button>
      <button class="btn btn-logout" onclick="handleLogout()">LOGOUT</button>
      <div id="fStatus" class="status"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ==================== SUPABASE CONFIGURATION ====================
const SUPABASE_PROJECT_URL = "YOUR_PROJECT_URL";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";
const SUPABASE_TABLE_NAME = "YOUR_TABLE_NAME";
const AUTO_LOGOUT_TIME = 60; // 1 মিনিট = 60 সেকেন্ড (আপনার পছন্দ অনুযায়ী সেকেন্ড দিন)
// ================================================================

const sb = supabase.createClient(SUPABASE_PROJECT_URL, SUPABASE_ANON_KEY);

// ==================== গ্লোবাল ভ্যারিয়েবল ====================
let logoutTimer = null;
let activityCheckInterval = null;

// ==================== পাসওয়ার্ড শো/হাইড টগল ====================
const eyeIcon = document.getElementById('eyeIcon');
const passInp = document.getElementById('logPass');

eyeIcon.addEventListener('click', function() {
    const isPass = passInp.type === 'password';
    passInp.type = isPass ? 'text' : 'password';
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
});

// এন্টার কি প্রেস করলেও লগইন হবে
passInp.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleLogin();
});

// ইমেইল ইনপুটেও এন্টার সাপোর্ট
document.getElementById('logEmail').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleLogin();
});

// ==================== ফর্ম ভ্যালিডেশন ====================
function validateEmail(email) {
    // ইমেইল ফরম্যাট চেক
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

function validateLoginForm(email, password) {
    let isValid = true;
    
    // ইমেইল ভ্যালিডেশন
    const emailError = document.getElementById('emailError');
    const emailInput = document.getElementById('logEmail');
    
    if (!email || email.trim() === '') {
        emailError.textContent = '⚠️ Email address is required!';
        emailError.classList.add('show');
        emailInput.classList.add('error');
        isValid = false;
    } else if (!validateEmail(email)) {
        emailError.textContent = '⚠️ Please enter a valid email address!';
        emailError.classList.add('show');
        emailInput.classList.add('error');
        isValid = false;
    } else {
        emailError.classList.remove('show');
        emailInput.classList.remove('error');
    }
    
    // পাসওয়ার্ড ভ্যালিডেশন
    const passError = document.getElementById('passError');
    const passInput = document.getElementById('logPass');
    
    if (!password || password.trim() === '') {
        passError.textContent = '⚠️ Password is required!';
        passError.classList.add('show');
        passInput.classList.add('error');
        isValid = false;
    } else if (password.length < 6) {
        passError.textContent = '⚠️ Password must be at least 6 characters!';
        passError.classList.add('show');
        passInput.classList.add('error');
        isValid = false;
    } else {
        passError.classList.remove('show');
        passInput.classList.remove('error');
    }
    
    return isValid;
}

// ইনপুট ফোকাস করলে এরর ক্লিয়ার
document.getElementById('logEmail').addEventListener('focus', function() {
    this.classList.remove('error');
    document.getElementById('emailError').classList.remove('show');
});

document.getElementById('logPass').addEventListener('focus', function() {
    this.classList.remove('error');
    document.getElementById('passError').classList.remove('show');
});

// ==================== ইনঅ্যাক্টিভিটি টাইমার ====================
function startInactivityTimer() {
    resetInactivityTimer();
    
    // প্রতি 1 সেকেন্ডে চেক করবে
    let lastActivity = Date.now();
    
    // অ্যাক্টিভিটি আপডেট
    const updateActivity = () => {
        lastActivity = Date.now();
    };
    
    // অ্যাক্টিভিটি ইভেন্ট লিসেনার
    const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click', 'input', 'focus'];
    activityEvents.forEach(event => {
        document.addEventListener(event, updateActivity);
    });
    
    // চেক ইন্টারভাল
    activityCheckInterval = setInterval(() => {
        const inactiveTime = (Date.now() - lastActivity) / 1000;
        
        if (inactiveTime >= AUTO_LOGOUT_TIME) {
            // টাইম আউট - লগআউট
            clearInterval(activityCheckInterval);
            
            // ইভেন্ট লিসেনার রিমুভ
            activityEvents.forEach(event => {
                document.removeEventListener(event, updateActivity);
            });
            
            autoLogout();
        }
    }, 1000); // ✅ প্রতি 1 সেকেন্ডে চেক
}

function resetInactivityTimer() {
    if (activityCheckInterval) {
        clearInterval(activityCheckInterval);
        activityCheckInterval = null;
    }
}

// ==================== অটো লগআউট ====================
function autoLogout() {
    resetInactivityTimer();
    
    const fStatus = document.getElementById('fStatus');
    if (fStatus && !document.getElementById('formCard').classList.contains('hidden')) {
        fStatus.innerText = '⏰ 1 মিনিট inactivity এর কারণে অটো লগআউট হয়েছে!';
        fStatus.className = "status status-warning";
    }
    
    setTimeout(() => {
        handleLogout();
    }, 2000);
}

// ==================== লগইন ফাংশন (ভ্যালিডেশন সহ) ====================
async function handleLogin() {
    const email = document.getElementById('logEmail').value.trim();
    const password = document.getElementById('logPass').value;
    const statusEl = document.getElementById('logStatus');
    const btn = document.getElementById('logBtn');

    // ⚠️ ফর্ম ভ্যালিডেশন - ফেইল করলে লগইন হবে না
    if (!validateLoginForm(email, password)) {
        statusEl.innerText = "❌ Please fill in all required fields correctly!";
        statusEl.className = "status status-error";
        return;
    }

    // বাটন ডিসেবল
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    
    // স্ট্যাটাস ক্লিয়ার
    statusEl.className = "status";
    statusEl.innerText = "";

    try {
        const { data, error } = await sb.auth.signInWithPassword({ 
            email: email, 
            password: password 
        });

        if (error) {
            // Supabase থেকে এরর মেসেজ
            let errorMsg = error.message;
            
            if (error.message.includes('Invalid login credentials')) {
                errorMsg = '❌ Incorrect email or password!';
            } else if (error.message.includes('Email not confirmed')) {
                errorMsg = '❌ Email not verified. Please check your inbox!';
            } else if (error.message.includes('rate limit')) {
                errorMsg = '⚠️ Too many attempts. Please try again later!';
            }
            
            statusEl.innerText = errorMsg;
            statusEl.className = "status status-error";
            btn.disabled = false;
            btn.innerHTML = 'LOGIN';
            return;
        }

        // লগইন সফল হয়েছে কিনা ডাবল চেক
        if (!data || !data.user) {
            statusEl.innerText = "❌ Login failed! Please try again.";
            statusEl.className = "status status-error";
            btn.disabled = false;
            btn.innerHTML = 'LOGIN';
            return;
        }

        // ✅ লগইন সফল
        statusEl.className = "status";
        statusEl.innerText = "";
        
        // UI স্যুইচ
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('formCard').classList.remove('hidden');
        
        // ইনপুট ক্লিয়ার
        document.getElementById('logEmail').value = '';
        document.getElementById('logPass').value = '';
        document.getElementById('emailError').classList.remove('show');
        document.getElementById('passError').classList.remove('show');
        document.getElementById('logEmail').classList.remove('error');
        document.getElementById('logPass').classList.remove('error');
        
        // ইনঅ্যাক্টিভিটি টাইমার স্টার্ট
        startInactivityTimer();
        
        // ডাটা লোড
        await loadExistingData();
        
    } catch (err) {
        console.error('Login error:', err);
        statusEl.innerText = "❌ Network error! Please check your connection.";
        statusEl.className = "status status-error";
        btn.disabled = false;
        btn.innerHTML = 'LOGIN';
    }
}

// ==================== এক্সিস্টিং ডাটা লোড ====================
async function loadExistingData() {
    try {
        const { data, error } = await sb
            .from(SUPABASE_TABLE_NAME)
            .select('*')
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (error) {
            console.error('Data load error:', error);
            return;
        }

        if (data) {
            document.getElementById('f1').value = data.website_title || '';
            document.getElementById('f2').value = data.favicon || '';
            document.getElementById('f3').value = data.profile_pic || '';
            document.getElementById('f4').value = data.name || '';
            document.getElementById('f5').value = data.title || '';
            
            document.getElementById('f6').value = extractUsername(data.facebook, 'facebook.com/');
            document.getElementById('f7').value = extractUsername(data.fb_page, 'facebook.com/');
            document.getElementById('f8').value = extractUsername(data.instagram, 'instagram.com/');
            document.getElementById('f10').value = extractUsername(data.tiktok, 'tiktok.com/@');
            document.getElementById('f11').value = extractUsername(data.telegram, 't.me/');
            document.getElementById('f12').value = extractUsername(data.twitter, 'x.com/');
            
            document.getElementById('f9').value = extractWhatsApp(data.whatsapp);
            
            document.getElementById('f13').value = data.phone || '';
            document.getElementById('f14').value = data.about || '';
            document.getElementById('f15').value = data.website || '';
            document.getElementById('f16').value = data.copyright_line || '';
            document.getElementById('f17').value = data.made_by || '';
            document.getElementById('f18').value = data.all_rights || '';
        }
    } catch (err) {
        console.error('Error loading data:', err);
    }
}

function extractUsername(url, prefix) {
    if (!url) return '';
    if (url.includes(prefix)) {
        return url.split(prefix)[1].replace(/\/$/, '');
    }
    return url;
}

function extractWhatsApp(url) {
    if (!url) return '';
    const match = url.match(/wa\.me\/(\+?\d+)/);
    return match ? match[1] : url;
}

// ==================== ডাটা আপডেট/ইনসার্ট ফাংশন ====================
async function updateData() {
    const btn = document.getElementById('upBtn');
    const st = document.getElementById('fStatus');
    
    const waRaw = document.getElementById('f9').value.trim();
    const fbRaw = document.getElementById('f6').value.trim();
    const fbPageRaw = document.getElementById('f7').value.trim();
    const igRaw = document.getElementById('f8').value.trim();
    const tiktokRaw = document.getElementById('f10').value.trim();
    const telegramRaw = document.getElementById('f11').value.trim();
    const twitterRaw = document.getElementById('f12').value.trim();
    
    const data = {
        website_title: document.getElementById('f1').value.trim(),
        favicon: document.getElementById('f2').value.trim(),
        profile_pic: document.getElementById('f3').value.trim(),
        name: document.getElementById('f4').value.trim(),
        title: document.getElementById('f5').value.trim(),
        facebook: fbRaw ? 'https://www.facebook.com/' + fbRaw : '',
        fb_page: fbPageRaw ? 'https://www.facebook.com/' + fbPageRaw : '',
        instagram: igRaw ? 'https://www.instagram.com/' + igRaw : '',
        whatsapp: waRaw ? 'https://wa.me/' + waRaw.replace(/\D/g, '') : '',
        tiktok: tiktokRaw ? 'https://www.tiktok.com/@' + tiktokRaw : '',
        telegram: telegramRaw ? 'https://t.me/' + telegramRaw : '',
        twitter: twitterRaw ? 'https://x.com/' + twitterRaw : '',
        phone: document.getElementById('f13').value.trim(),
        about: document.getElementById('f14').value.trim(),
        website: document.getElementById('f15').value.trim(),
        copyright_line: document.getElementById('f16').value.trim(),
        made_by: document.getElementById('f17').value.trim(),
        all_rights: document.getElementById('f18').value.trim()
    };
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating...';
    
    try {
        const { data: existingData, error: fetchError } = await sb
            .from(SUPABASE_TABLE_NAME)
            .select('id')
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();
        
        if (fetchError) throw fetchError;
        
        let result;
        
        if (existingData && existingData.id) {
            result = await sb.from(SUPABASE_TABLE_NAME).update(data).eq('id', existingData.id);
        } else {
            result = await sb.from(SUPABASE_TABLE_NAME).insert([data]);
        }
        
        if (result.error) throw result.error;
        
        st.innerText = "✅ Success: Data Updated Successfully!";
        st.className = "status status-success";
        
        setTimeout(() => {
            st.className = "status";
            st.innerText = "";
        }, 4000);
        
    } catch (error) {
        console.error('Update error:', error);
        st.innerText = "❌ Error: " + (error.message || 'Something went wrong');
        st.className = "status status-error";
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'UPDATE INFORMATION';
    }
}

// ==================== লগআউট ফাংশন ====================
async function handleLogout() {
    resetInactivityTimer();
    
    await sb.auth.signOut();
    
    document.getElementById('formCard').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
    
    document.querySelectorAll('#formCard input, #formCard textarea').forEach(el => el.value = '');
    
    document.getElementById('logEmail').value = '';
    document.getElementById('logPass').value = '';
    document.getElementById('logStatus').className = 'status';
    document.getElementById('logStatus').innerText = '';
    document.getElementById('emailError').classList.remove('show');
    document.getElementById('passError').classList.remove('show');
    document.getElementById('logEmail').classList.remove('error');
    document.getElementById('logPass').classList.remove('error');
    
    // ✅ লগইন বাটন রিসেট
    const logBtn = document.getElementById('logBtn');
    logBtn.disabled = false;
    logBtn.innerHTML = 'LOGIN';
    
    const fStatus = document.getElementById('fStatus');
    if (fStatus) {
        fStatus.className = 'status';
        fStatus.innerText = '';
    }
}

// ==================== পেজ রিফ্রেশ চেক ====================
function isPageRefreshed() {
    const navEntries = performance.getEntriesByType('navigation');
    if (navEntries.length > 0 && navEntries[0].type === 'reload') return true;
    if (performance.navigation && performance.navigation.type === 1) return true;
    return false;
}

// ==================== সেশন চেক ====================
async function checkSession() {
    try {
        const { data: { session } } = await sb.auth.getSession();
        
        if (session && session.user) {
            if (isPageRefreshed()) {
                // রিফ্রেশ করা হয়েছে - লগআউট
                await sb.auth.signOut();
                showLoginPage();
            } else {
                // নরমাল - অ্যাডমিন প্যানেল
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('formCard').classList.remove('hidden');
                startInactivityTimer();
                await loadExistingData();
            }
        } else {
            showLoginPage();
        }
    } catch (err) {
        console.error('Session check error:', err);
        showLoginPage();
    }
}

function showLoginPage() {
    document.getElementById('formCard').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
    resetInactivityTimer();
    
    // ✅ লগইন বাটন রিসেট
    const logBtn = document.getElementById('logBtn');
    if (logBtn) {
        logBtn.disabled = false;
        logBtn.innerHTML = 'LOGIN';
    }
}

// ==================== ইনিশিয়ালাইজেশন ====================
function init() {
    checkSession();
}

init();
</script>
</body>
