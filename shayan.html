<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase লগইন সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* লগইন ফর্ম স্টাইল */
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 400px;
            max-width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        /* ড্যাশবোর্ড স্টাইল */
        .dashboard-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 600px;
            max-width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .dashboard-content {
            padding: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .logout-btn {
            background: linear-gradient(135deg, #f56565 0%, #ed64a6 100%);
            width: auto;
            padding: 8px 20px;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .info {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .user-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .user-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .user-info {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
        }

        .user-info p {
            margin: 8px 0;
            color: #555;
            word-break: break-all;
        }

        .user-info strong {
            color: #333;
        }

        .test-mode {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            font-size: 13px;
        }

        .test-mode h4 {
            color: #856404;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============= Supabase কনফিগারেশন =============
        const SUPABASE_URL = 'https://lsodigwljvsvvspvhjpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxzb2RpZ3dsanZzdnZzcHZoanBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTk5OTUsImV4cCI6MjA5NDY5NTk5NX0.ysvkIIuOprA-ZtEoY96GpEuSqfHhMeHexpeLoN_XOho';
        
        // Supabase ক্লায়েন্ট তৈরি
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // অ্যাপ রেন্ডার ফাংশন
        function renderLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <h2>🔐 লগইন করুন</h2>
                    <div class="subtitle">আপনার অ্যাকাউন্টে প্রবেশ করুন</div>
                    
                    <form id="loginForm">
                        <div class="input-group">
                            <label>📧 ইমেইল</label>
                            <input type="email" id="email" required placeholder="আপনার ইমেইল দিন" autocomplete="email">
                        </div>
                        <div class="input-group">
                            <label>🔒 পাসওয়ার্ড</label>
                            <input type="password" id="password" required placeholder="আপনার পাসওয়ার্ড দিন" autocomplete="current-password">
                        </div>
                        <button type="submit">লগইন করুন</button>
                    </form>
                    
                    <div id="message" class="message"></div>
                    <div id="loading" class="loading">লগইন হচ্ছে</div>
                    
                    <div class="test-mode">
                        <h4>📝 টেস্ট নির্দেশনা:</h4>
                        <p>1. <strong>Supabase ড্যাশবোর্ড</strong> এ গিয়ে একটি ইউজার তৈরি করুন</p>
                        <p>2. Authentication → Users → Add User</p>
                        <p>3. ইমেইল ও পাসওয়ার্ড দিন এবং লগইন করুন</p>
                        <p>4. অথবা SQL এডিটর চালান:</p>
                        <code style="background:#f4f4f4; display:block; padding:8px; margin-top:5px; font-size:11px;">
                            INSERT INTO auth.users (email, encrypted_password, email_confirmed_at)<br>
                            VALUES ('test@test.com', crypt('test123', gen_salt('bf')), now());
                        </code>
                    </div>
                    
                    <div class="info">
                        💡 নিরাপদ লগইন সিস্টেম | Supabase দ্বারা চালিত
                    </div>
                </div>
            `;
            
            // ফর্ম ইভেন্ট লিসেনার
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        }
        
        function renderDashboard(user) {
            document.getElementById('app').innerHTML = `
                <div class="dashboard-container">
                    <div class="dashboard-header">
                        <div>
                            <h2>👋 স্বাগতম!</h2>
                            <p style="opacity: 0.9;">আপনি সফলভাবে লগইন করেছেন</p>
                        </div>
                        <button class="logout-btn" onclick="handleLogout()">🚪 লগআউট</button>
                    </div>
                    <div class="dashboard-content">
                        <div class="user-card">
                            <h3>📊 আপনার অ্যাকাউন্ট তথ্য</h3>
                            <div class="user-info">
                                <p><strong>📧 ইমেইল:</strong> ${user.email}</p>
                                <p><strong>🆔 ইউজার আইডি:</strong> ${user.id}</p>
                                <p><strong>📅 লগইন সময়:</strong> ${new Date(user.last_sign_in_at).toLocaleString('bn-BD')}</p>
                                <p><strong>📆 অ্যাকাউন্ট তৈরি:</strong> ${new Date(user.created_at).toLocaleString('bn-BD')}</p>
                                <p><strong>✅ ইমেইল কনফার্ম:</strong> ${user.email_confirmed_at ? 'হ্যাঁ' : 'না'}</p>
                            </div>
                        </div>
                        
                        <div class="test-mode" style="margin-top: 20px;">
                            <h4>✨ সফলভাবে লগইন সম্পন্ন!</h4>
                            <p>আপনি এখন Supabase এ সংযুক্ত।</p>
                            <p><strong>লগআউট</strong> করতে উপরের বাটন ব্যবহার করুন।</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // লগইন হ্যান্ডলার
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ দয়া করে ইমেইল এবং পাসওয়ার্ড দিন!';
                return;
            }
            
            loadingDiv.classList.add('active');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                messageDiv.className = 'message success';
                messageDiv.innerHTML = '✅ লগইন সফল! ড্যাশবোর্ড লোড হচ্ছে...';
                
                setTimeout(() => {
                    renderDashboard(data.user);
                }, 1000);
                
            } catch (error) {
                messageDiv.className = 'message error';
                
                if (error.message.includes('Invalid login credentials')) {
                    messageDiv.innerHTML = '❌ ইমেইল বা পাসওয়ার্ড ভুল! সঠিক তথ্য দিন।';
                } else if (error.message.includes('Email not confirmed')) {
                    messageDiv.innerHTML = '❌ ইমেইল কনফার্ম করা হয়নি। ইমেইল চেক করুন।';
                } else {
                    messageDiv.innerHTML = `❌ ${error.message}`;
                }
                
                console.error('Login error:', error);
            } finally {
                loadingDiv.classList.remove('active');
            }
        }
        
        // লগআউট হ্যান্ডলার
        window.handleLogout = async function() {
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error('Logout error:', error);
            } else {
                renderLoginPage();
            }
        };
        
        // চেক করা আগে থেকে লগইন করা আছে কিনা
        async function checkAuth() {
            const { data: { session }, error } = await supabase.auth.getSession();
            
            if (session) {
                renderDashboard(session.user);
            } else {
                renderLoginPage();
            }
        }
        
        // অ্যাপ শুরু করুন
        checkAuth();
    </script>
</body>
</html>
