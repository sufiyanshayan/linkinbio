<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Link in Bio | Smart Bio Links</title>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
        }

        /* Links Container */
        .links-container {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Button Styles */
        .bio-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e9ecef;
        }

        .bio-link:hover {
            transform: translateX(5px);
            background: #667eea;
            border-color: #667eea;
        }

        .bio-link:hover .link-text {
            color: white;
        }

        .bio-link:hover .click-count {
            background: white;
            color: #667eea;
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .link-text {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            transition: color 0.3s ease;
        }

        .click-count {
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.9;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* No Data Message */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }
            
            .bio-link {
                padding: 10px 15px;
            }
            
            .link-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="loading">
        <div class="spinner"></div>
        <div>Loading your links...</div>
    </div>
</div>

<script>
    // ============================================
    // YOUR SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://gfahimzxyqwspkeqsvlg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Global variables
    let allLinks = [];
    let profileData = null;
    
    // ============================================
    // RENDER PROFILE SECTION
    // ============================================
    function renderProfile() {
        if (!profileData) return;
        
        return `
            <div class="profile-card">
                <img class="profile-img" src="${profileData.profile_image || 'https://randomuser.me/api/portraits/men/1.jpg'}" alt="Profile">
                <div class="name">${profileData.name || 'Your Name'}</div>
                <div class="title">${profileData.title || 'Content Creator'}</div>
                <div class="status-badge" id="realtimeStatus">🟢 Live</div>
            </div>
        `;
    }
    
    // ============================================
    // RENDER LINKS SECTION
    // ============================================
    function renderLinks() {
        if (!allLinks || allLinks.length === 0) {
            return `
                <div class="links-container">
                    <div class="no-data">
                        📭 No links found.<br>
                        <small>Add links to click_stats table in Supabase</small>
                    </div>
                </div>
            `;
        }
        
        const activeLinks = allLinks.filter(link => link.is_active === true).sort((a, b) => a.order - b.order);
        
        let linksHtml = '<div class="links-container">';
        
        activeLinks.forEach(link => {
            linksHtml += `
                <a href="${link.button_url || '#'}" class="bio-link" target="_blank" data-id="${link.id}" data-platform="${link.platform}">
                    <div class="link-left">
                        <img class="link-icon" src="${link.button_icon || 'https://cdn.simpleicons.org/link'}" alt="${link.button_name}" onerror="this.src='https://cdn.simpleicons.org/link'">
                        <span class="link-text">${link.button_name || link.platform}</span>
                    </div>
                    <span class="click-count" id="count-${link.id}">${formatNumber(link.click_count || 0)}</span>
                </a>
            `;
        });
        
        linksHtml += '</div>';
        return linksHtml;
    }
    
    // Format large numbers
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    // ============================================
    // UPDATE CLICK COUNT
    // ============================================
    async function updateClickCount(id) {
        try {
            const link = allLinks.find(l => l.id == id);
            if (!link) return;
            
            const newCount = (link.click_count || 0) + 1;
            
            // Optimistic UI update
            const countSpan = document.getElementById(`count-${id}`);
            if (countSpan) {
                countSpan.textContent = formatNumber(newCount);
                countSpan.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    if (countSpan) countSpan.style.transform = 'scale(1)';
                }, 200);
            }
            
            // Update database
            const { error } = await supabase
                .from('click_stats')
                .update({ 
                    click_count: newCount,
                    updated_at: new Date()
                })
                .eq('id', id);
            
            if (error) {
                console.error('Update error:', error);
                // Revert on error
                if (countSpan) countSpan.textContent = formatNumber(link.click_count || 0);
            } else {
                link.click_count = newCount;
            }
            
        } catch (error) {
            console.error('Error updating click:', error);
        }
    }
    
    // ============================================
    // LOAD DATA FROM SUPABASE
    // ============================================
    async function loadData() {
        try {
            // Load profile
            const { data: profile, error: profileError } = await supabase
                .from('profile_info')
                .select('*')
                .limit(1)
                .single();
            
            if (!profileError && profile) {
                profileData = profile;
            }
            
            // Load links
            const { data: links, error: linksError } = await supabase
                .from('click_stats')
                .select('*')
                .order('order', { ascending: true });
            
            if (linksError) throw linksError;
            
            allLinks = links || [];
            
            // Render everything
            const appHtml = `
                ${renderProfile()}
                ${renderLinks()}
                <div class="footer">
                    ${profileData?.footer_text || '© 2024 All Rights Reserved'}
                </div>
            `;
            
            document.getElementById('app').innerHTML = appHtml;
            
            // Attach click handlers
            document.querySelectorAll('.bio-link[data-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    updateClickCount(id);
                });
            });
            
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('app').innerHTML = `
                <div class="loading">
                    <div style="color: white;">❌ Error loading data</div>
                    <small style="color: rgba(255,255,255,0.7);">${error.message}</small>
                </div>
            `;
        }
    }
    
    // ============================================
    // SETUP REALTIME SUBSCRIPTION
    // ============================================
    function setupRealtime() {
        console.log('Setting up realtime subscription...');
        
        // Subscribe to click_stats changes
        const channel = supabase
            .channel('click_stats_changes')
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'click_stats'
            }, (payload) => {
                console.log('🔴 Realtime update received:', payload);
                
                const updatedLink = payload.new;
                const index = allLinks.findIndex(l => l.id === updatedLink.id);
                
                if (index !== -1) {
                    allLinks[index] = updatedLink;
                    
                    // Update UI
                    const countSpan = document.getElementById(`count-${updatedLink.id}`);
                    if (countSpan) {
                        countSpan.textContent = formatNumber(updatedLink.click_count || 0);
                        countSpan.style.animation = 'none';
                        countSpan.offsetHeight; // Trigger reflow
                        countSpan.style.backgroundColor = '#4CAF50';
                        countSpan.style.color = 'white';
                        setTimeout(() => {
                            if (countSpan) {
                                countSpan.style.backgroundColor = '';
                                countSpan.style.color = '';
                            }
                        }, 500);
                    }
                }
            })
            .subscribe((status) => {
                console.log('Realtime subscription status:', status);
                const statusEl = document.getElementById('realtimeStatus');
                if (statusEl) {
                    if (status === 'SUBSCRIBED') {
                        statusEl.textContent = '🟢 Live';
                        statusEl.style.backgroundColor = '#4CAF50';
                    } else {
                        statusEl.textContent = '🟡 Connecting...';
                        statusEl.style.backgroundColor = '#FF9800';
                    }
                }
            });
        
        return channel;
    }
    
    // ============================================
    // INITIALIZE APP
    // ============================================
    async function init() {
        await loadData();
        setupRealtime();
    }
    
    // Start the app
    init();
</script>

</body>
</html>
