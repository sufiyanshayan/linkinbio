<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link in Bio | Realtime Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .title {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .realtime-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-connected {
            background: #4CAF50;
            color: white;
        }

        .status-connecting {
            background: #FF9800;
            color: white;
        }

        .status-disconnected {
            background: #f44336;
            color: white;
        }

        .links-container {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .bio-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e9ecef;
        }

        .bio-link:hover {
            transform: translateX(5px);
            background: #667eea;
        }

        .bio-link:hover .link-text {
            color: white;
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-icon {
            width: 22px;
            height: 22px;
        }

        .link-text {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            transition: color 0.3s ease;
        }

        .click-count {
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .debug-panel {
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>
</div>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://gfahimzxyqwspkeqsvlg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let allLinks = [];
    let profileData = null;
    let debugLogs = [];
    
    function addDebugLog(message) {
        const timestamp = new Date().toLocaleTimeString();
        debugLogs.unshift(`[${timestamp}] ${message}`);
        if (debugLogs.length > 10) debugLogs.pop();
        
        const debugEl = document.getElementById('debugPanel');
        if (debugEl) {
            debugEl.innerHTML = debugLogs.map(log => `<div>${log}</div>`).join('');
        }
        console.log(message);
    }
    
    async function loadData() {
        try {
            addDebugLog('📥 Loading data from Supabase...');
            
            // Load profile
            const { data: profile, error: profileError } = await supabase
                .from('profile_info')
                .select('*')
                .single();
            
            if (profileError) {
                addDebugLog(`❌ Profile error: ${profileError.message}`);
            } else {
                profileData = profile;
                addDebugLog('✅ Profile loaded');
            }
            
            // Load links
            const { data: links, error: linksError } = await supabase
                .from('click_stats')
                .select('*')
                .order('order', { ascending: true });
            
            if (linksError) {
                addDebugLog(`❌ Links error: ${linksError.message}`);
                throw linksError;
            }
            
            allLinks = links || [];
            addDebugLog(`✅ Loaded ${allLinks.length} links`);
            
            renderApp();
            
        } catch (error) {
            addDebugLog(`❌ Error: ${error.message}`);
            document.getElementById('app').innerHTML = `<div class="loading">❌ Error: ${error.message}</div>`;
        }
    }
    
    function renderApp() {
        const profileHtml = profileData ? `
            <div class="profile-card">
                <img class="profile-img" src="${profileData.profile_image || 'https://randomuser.me/api/portraits/men/1.jpg'}" alt="Profile">
                <div class="name">${profileData.name || 'Your Name'}</div>
                <div class="title">${profileData.title || 'Content Creator'}</div>
                <div class="realtime-status" id="realtimeStatus">🔄 Connecting...</div>
            </div>
        ` : '<div class="profile-card">Loading profile...</div>';
        
        let linksHtml = '<div class="links-container">';
        
        if (allLinks.length === 0) {
            linksHtml += '<div style="text-align:center; padding:40px;">No links found. Add data to click_stats table.</div>';
        } else {
            allLinks.filter(l => l.is_active !== false).forEach(link => {
                linksHtml += `
                    <a href="${link.button_url || '#'}" class="bio-link" target="_blank" data-id="${link.id}" data-platform="${link.platform}">
                        <div class="link-left">
                            <img class="link-icon" src="${link.button_icon || 'https://cdn.simpleicons.org/link'}" alt="${link.button_name}" onerror="this.src='https://cdn.simpleicons.org/link'">
                            <span class="link-text">${link.button_name || link.platform}</span>
                        </div>
                        <span class="click-count" id="count-${link.id}">${link.click_count || 0}</span>
                    </a>
                `;
            });
        }
        
        linksHtml += '</div>';
        
        const footerHtml = `<div class="footer">${profileData?.footer_text || '© 2024 All Rights Reserved'}</div>`;
        const debugHtml = `<div class="debug-panel" id="debugPanel"></div>`;
        
        document.getElementById('app').innerHTML = profileHtml + linksHtml + footerHtml + debugHtml;
        
        // Add debug logs to panel
        const debugEl = document.getElementById('debugPanel');
        if (debugEl) {
            debugEl.innerHTML = debugLogs.map(log => `<div>${log}</div>`).join('');
        }
        
        // Attach click handlers
        document.querySelectorAll('.bio-link[data-id]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                updateClickCount(id);
            });
        });
    }
    
    async function updateClickCount(id) {
        try {
            const link = allLinks.find(l => l.id == id);
            if (!link) return;
            
            const newCount = (link.click_count || 0) + 1;
            addDebugLog(`🖱️ Click on ${link.button_name}: ${link.click_count} → ${newCount}`);
            
            // Optimistic update
            const countSpan = document.getElementById(`count-${id}`);
            if (countSpan) countSpan.textContent = newCount;
            
            const { error } = await supabase
                .from('click_stats')
                .update({ click_count: newCount, updated_at: new Date() })
                .eq('id', id);
            
            if (error) {
                addDebugLog(`❌ Update failed: ${error.message}`);
                if (countSpan) countSpan.textContent = link.click_count;
            } else {
                link.click_count = newCount;
                addDebugLog(`✅ Click recorded in database`);
            }
            
        } catch (error) {
            addDebugLog(`❌ Error: ${error.message}`);
        }
    }
    
    // Realtime setup - FIXED VERSION
    function setupRealtime() {
        addDebugLog('🔌 Setting up realtime subscription...');
        
        // Method 1: Using channel with all events
        const channel = supabase.channel('db-changes')
            .on(
                'postgres_changes',
                {
                    event: '*',
                    schema: 'public',
                    table: 'click_stats'
                },
                (payload) => {
                    addDebugLog(`🔴 REALTIME EVENT: ${payload.eventType} on ${payload.table}`);
                    addDebugLog(`   Data: ${JSON.stringify(payload.new).substring(0, 100)}`);
                    
                    if (payload.eventType === 'UPDATE') {
                        const updatedLink = payload.new;
                        const index = allLinks.findIndex(l => l.id === updatedLink.id);
                        
                        if (index !== -1) {
                            allLinks[index] = updatedLink;
                            const countSpan = document.getElementById(`count-${updatedLink.id}`);
                            if (countSpan) {
                                const oldValue = countSpan.textContent;
                                countSpan.textContent = updatedLink.click_count;
                                addDebugLog(`📊 Count updated: ${oldValue} → ${updatedLink.click_count}`);
                                
                                // Visual feedback
                                countSpan.style.transform = 'scale(1.2)';
                                countSpan.style.backgroundColor = '#4CAF50';
                                countSpan.style.color = 'white';
                                setTimeout(() => {
                                    countSpan.style.transform = 'scale(1)';
                                    countSpan.style.backgroundColor = '';
                                    countSpan.style.color = '';
                                }, 500);
                            }
                        }
                    }
                }
            )
            .subscribe((status) => {
                addDebugLog(`📡 Realtime status: ${status}`);
                const statusEl = document.getElementById('realtimeStatus');
                if (statusEl) {
                    if (status === 'SUBSCRIBED') {
                        statusEl.textContent = '✅ Live';
                        statusEl.className = 'realtime-status status-connected';
                        addDebugLog('✅ Realtime is ACTIVE! Try clicking from another device/browser.');
                    } else if (status === 'CONNECTING') {
                        statusEl.textContent = '🔄 Connecting...';
                        statusEl.className = 'realtime-status status-connecting';
                    } else {
                        statusEl.textContent = '❌ Disconnected';
                        statusEl.className = 'realtime-status status-disconnected';
                    }
                }
            });
        
        return channel;
    }
    
    // Test realtime manually
    window.testRealtime = async function() {
        addDebugLog('🧪 Testing realtime - updating Facebook count...');
        const { data, error } = await supabase
            .from('click_stats')
            .update({ click_count: Math.floor(Math.random() * 100) })
            .eq('platform', 'facebook')
            .select();
        
        if (error) {
            addDebugLog(`❌ Test failed: ${error.message}`);
        } else {
            addDebugLog(`✅ Test update sent! Check if realtime event appears above.`);
        }
    };
    
    async function init() {
        await loadData();
        setupRealtime();
        addDebugLog('🎉 App initialized. Type "testRealtime()" in console to test.');
    }
    
    init();
</script>

</body>
</html>
