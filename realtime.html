<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link in Bio | Realtime</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: 0 auto;
  text-align: center;
}

.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
  border: 2px solid #000;
}

.name {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

.title {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  text-decoration: none;
  color: black;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
  cursor: pointer;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn img {
  width: 20px;
  height: 20px;
}

.click-count {
  background: #e0e0e0;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  margin-left: auto;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #999;
}

.status {
  font-size: 11px;
  color: green;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <img class="profile-img" id="profileImg" src="Your_Profile_Picture_Link" alt="Profile">
  <div class="name" id="profileName">Your_Name</div>
  <div class="title" id="profileTitle">Your_Title</div>
  
  <div class="status" id="realtimeStatus">🟢 Connecting to realtime...</div>
  
  <div id="buttonsContainer"></div>
  
  <div class="footer" id="footerText">
    Copyright © 2026 MADE BY "Your_Name". All Rights Reserved.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gfahimzxyqwspkeqsvlg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYWhpbXp4eXF3c3BrZXFzdmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Njk5NDksImV4cCI6MjA5NjA0NTk0OX0.lkZ7wpWAKknxpMMDCsRG2OiPD2wOvwFejSozzLDe0Dc';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allButtons = [];

// Load data from database
async function loadData() {
  try {
    console.log('Loading data...');
    
    const { data, error } = await supabase
      .from('linkinbioweb')
      .select('*')
      .eq('is_active', true)
      .order('order', { ascending: true });
    
    if (error) {
      console.error('Error:', error);
      document.getElementById('buttonsContainer').innerHTML = `<div style="color:red">Error: ${error.message}</div>`;
      return;
    }
    
    console.log('Loaded buttons:', data);
    allButtons = data || [];
    renderButtons();
    
  } catch (error) {
    console.error('Error:', error);
  }
}

// Render buttons
function renderButtons() {
  const container = document.getElementById('buttonsContainer');
  
  if (!allButtons || allButtons.length === 0) {
    container.innerHTML = '<div>No buttons found. Please add data to linkinbioweb table.</div>';
    return;
  }
  
  let html = '';
  allButtons.forEach(btn => {
    html += `
      <a href="${btn.button_url || '#'}" class="btn" target="_blank" data-id="${btn.id}" data-platform="${btn.platform}">
        <img src="${btn.button_icon || 'https://cdn.simpleicons.org/link/000000'}" alt="${btn.button_title}">
        ${btn.button_title || btn.platform}
        <span class="click-count" id="count-${btn.id}">${btn.click_count || 0}</span>
      </a>
    `;
  });
  
  container.innerHTML = html;
  
  // Add click handlers
  document.querySelectorAll('.btn[data-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const id = btn.getAttribute('data-id');
      await updateClickCount(id);
    });
  });
}

// Update click count
async function updateClickCount(id) {
  try {
    const button = allButtons.find(b => b.id == id);
    if (!button) return;
    
    const newCount = (button.click_count || 0) + 1;
    
    // Optimistic update - UI তে আগে দেখান
    const countSpan = document.getElementById(`count-${id}`);
    if (countSpan) countSpan.innerText = newCount;
    
    // Database এ আপডেট করুন
    const { error } = await supabase
      .from('linkinbioweb')
      .update({ 
        click_count: newCount,
        updated_at: new Date()
      })
      .eq('id', id);
    
    if (error) {
      console.error('Update error:', error);
      // Rollback if error
      if (countSpan) countSpan.innerText = button.click_count || 0;
    } else {
      button.click_count = newCount;
    }
    
  } catch (error) {
    console.error('Error:', error);
  }
}

// Setup Realtime - CORRECTED VERSION
function setupRealtime() {
  console.log('Setting up realtime subscription...');
  
  const channel = supabase
    .channel('linkinbioweb-realtime')  // Unique channel name
    .on(
      'postgres_changes',
      {
        event: 'UPDATE',  // Listen to UPDATE events
        schema: 'public',
        table: 'linkinbioweb'
      },
      (payload) => {
        console.log('🔴 REALTIME UPDATE RECEIVED:', payload);
        
        // Update the local data
        const updatedButton = payload.new;
        const index = allButtons.findIndex(b => b.id === updatedButton.id);
        
        if (index !== -1) {
          allButtons[index] = updatedButton;
          
          // Update UI
          const countSpan = document.getElementById(`count-${updatedButton.id}`);
          if (countSpan) {
            countSpan.innerText = updatedButton.click_count || 0;
            countSpan.style.backgroundColor = '#4CAF50';
            countSpan.style.color = 'white';
            setTimeout(() => {
              countSpan.style.backgroundColor = '#e0e0e0';
              countSpan.style.color = 'black';
            }, 500);
          }
          
          document.getElementById('realtimeStatus').innerHTML = '🟢 Realtime connected - Last update received!';
          setTimeout(() => {
            document.getElementById('realtimeStatus').innerHTML = '🟢 Realtime active';
          }, 2000);
        }
      }
    )
    .subscribe((status) => {
      console.log('Subscription status:', status);
      if (status === 'SUBSCRIBED') {
        document.getElementById('realtimeStatus').innerHTML = '🟢 Realtime connected and active';
      }
    });
  
  return channel;
}

// Test function to manually update (for testing realtime)
async function testRealtime() {
  console.log('Testing realtime...');
  const { data, error } = await supabase
    .from('linkinbioweb')
    .update({ click_count: 999 })
    .eq('platform', 'facebook');
  
  if (error) console.error('Test error:', error);
  else console.log('Test update sent');
}

// Initialize
async function init() {
  await loadData();
  setupRealtime();
  
  // Optional: Add test button in console
  console.log('To test realtime, run: testRealtime()');
}

init();

// Expose test function to console
window.testRealtime = testRealtime;
</script>

</body>
</html>
